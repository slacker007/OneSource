x-app-environment: &app-environment
  AUTH_SECRET: ${AUTH_SECRET}
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  DEADLINE_REMINDER_LOOKAHEAD_DAYS: ${DEADLINE_REMINDER_LOOKAHEAD_DAYS:-7}
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NEXTAUTH_URL: ${NEXTAUTH_URL}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,db,web,worker,test,playwright}
  SAM_GOV_API_KEY: ${SAM_GOV_API_KEY:-}
  SAM_GOV_SEARCH_ENDPOINT: ${SAM_GOV_SEARCH_ENDPOINT:-https://api.sam.gov/prod/opportunities/v2/search}
  SAM_GOV_TIMEOUT_MS: ${SAM_GOV_TIMEOUT_MS:-15000}
  SAM_GOV_USE_FIXTURES: ${SAM_GOV_USE_FIXTURES:-false}
  http_proxy: ${HTTP_PROXY:-}
  https_proxy: ${HTTPS_PROXY:-}
  no_proxy: ${NO_PROXY:-localhost,127.0.0.1,::1,db,web,worker,test,playwright}

x-build-args: &build-args
  CONTAINER_PROXY_CA_ENDPOINT: ${CONTAINER_PROXY_CA_ENDPOINT:-registry.npmjs.org:443}
  CONTAINER_TRUST_PROXY_CA: ${CONTAINER_TRUST_PROXY_CA:-true}
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,db,web,worker,test,playwright}

services:
  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    tmpfs:
      - /var/lib/postgresql/data

  test:
    build:
      args: *build-args
      context: .
      target: test
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *app-environment
      NODE_ENV: test
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        mkdir -p node_modules
        desired_hash="$$(cat package.json package-lock.json prisma/schema.prisma prisma.config.mjs | sha256sum | cut -d' ' -f1)"
        current_hash="$$(cat node_modules/.onesource-deps-hash 2>/dev/null || true)"
        image_hash="$$(cat /opt/onesource-test/package.json /opt/onesource-test/package-lock.json /opt/onesource-test/prisma/schema.prisma /opt/onesource-test/prisma.config.mjs | sha256sum | cut -d' ' -f1)"
        if [ ! -x node_modules/.bin/vitest ] || [ "$$current_hash" != "$$desired_hash" ]; then
          find node_modules -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
          if [ "$$desired_hash" = "$$image_hash" ]; then
            cp -R /opt/onesource-test/node_modules/. node_modules/
          else
            npm ci
            npm run prisma:generate
          fi
          printf "%s" "$$desired_hash" > node_modules/.onesource-deps-hash
        fi
        while sleep 3600; do :; done
    volumes:
      - .:/app
      - test_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /app/node_modules/.onesource-deps-hash && test -x /app/node_modules/.bin/eslint",
        ]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 2s

  web:
    build:
      args: *build-args
      context: .
      target: e2e-web
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *app-environment
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
    command: node server.js
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response)=>{if(!response.ok)process.exit(1);}).catch(()=>process.exit(1));",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  playwright:
    build:
      args: *build-args
      context: .
      target: playwright
    depends_on:
      web:
        condition: service_healthy
    environment:
      PLAYWRIGHT_BASE_URL: http://web:3000
      CI: "1"
    init: true
    ipc: host
    command: npm run e2e
    volumes:
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results

volumes:
  test_node_modules:
